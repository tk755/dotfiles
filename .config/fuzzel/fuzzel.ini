[main]
font=JetBrains Mono Slashed NF:size=10
prompt="> "
lines=10
width=40
icons-enabled=yes
match-mode=fzf
anchor=top-left
x-margin=16
y-margin=16
terminal=ghostty -e
fields=filename,name,generic,keywords
horizontal-pad=10
vertical-pad=10
inner-pad=4
line-height=20

[colors]
background=1C1E26FA
text=D8DEE9FF
prompt=5b9bf8FF
input=D8DEE9FF
match=5b9bf8FF
selection=5b9bf880
selection-text=D8DEE9FF
selection-match=5b9bf8FF
counter=8C8C8CFF
border=363840FF

[border]
width=2
radius=4
